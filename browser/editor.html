<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>No Survivors - Level Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #FCBF49; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }

#sidebar {
  width: 260px;
  background: #003049;
  display: flex;
  flex-direction: column;
  border-right: 2px solid #F77F00;
  overflow-y: auto;
}

#sidebar h2 { padding: 8px; font-size: 14px; border-bottom: 1px solid #F77F00; }
#sidebar h3 { padding: 6px 8px 2px; font-size: 11px; color: #F77F00; }

#controls {
  padding: 8px;
  border-bottom: 1px solid #F77F00;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
#controls select, #controls button {
  background: #003049;
  color: #FCBF49;
  border: 1px solid #F77F00;
  padding: 4px 8px;
  font-family: monospace;
  font-size: 12px;
  cursor: pointer;
}
#controls button:hover { background: #F77F00; color: #003049; }

#layers {
  padding: 8px;
  border-bottom: 1px solid #F77F00;
}
#layers label {
  display: block;
  padding: 2px 0;
  font-size: 12px;
  cursor: pointer;
}
#layers input[type="radio"] { margin-right: 4px; }

.palette-section { border-bottom: 1px solid #F77F00; }
.palette-grid {
  display: flex;
  flex-wrap: wrap;
  padding: 4px;
  gap: 2px;
}
.palette-item {
  width: 32px;
  height: 32px;
  border: 2px solid transparent;
  cursor: pointer;
  image-rendering: pixelated;
  background: #888;
}
.palette-item:hover { border-color: #FCBF49; }
.palette-item.selected { border-color: #D62828; background: #aaa; }
.palette-item canvas { width: 100%; height: 100%; image-rendering: pixelated; }

#main {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#viewport {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  cursor: crosshair;
}

#status {
  position: absolute;
  bottom: 8px;
  left: 8px;
  background: #003049;
  color: #FCBF49;
  padding: 4px 8px;
  font-size: 11px;
  border: 1px solid #F77F00;
}

#tool-bar {
  position: absolute;
  top: 8px;
  left: 8px;
  display: flex;
  gap: 4px;
}
#tool-bar button {
  background: #003049;
  color: #FCBF49;
  border: 1px solid #F77F00;
  padding: 4px 8px;
  font-family: monospace;
  font-size: 12px;
  cursor: pointer;
}
#tool-bar button:hover, #tool-bar button.active { background: #F77F00; color: #003049; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>NO SURVIVORS EDITOR</h2>
  <div id="controls">
    <select id="level-select"></select>
    <div style="display:flex;gap:4px">
      <button id="btn-load">LOAD</button>
      <button id="btn-save">SAVE</button>
      <button id="btn-export">EXPORT</button>
    </div>
  </div>
  <div id="layers">
    <label><input type="radio" name="layer" value="floors" checked> Floors</label>
    <label><input type="radio" name="layer" value="walls"> Walls</label>
    <label><input type="radio" name="layer" value="furniture"> Furniture</label>
    <label><input type="radio" name="layer" value="items"> Items</label>
    <label><input type="radio" name="layer" value="enemies"> Enemies</label>
  </div>
  <div id="palette"></div>
</div>

<div id="main">
  <div id="tool-bar">
    <button id="tool-paint" class="active">PAINT</button>
    <button id="tool-erase">ERASE</button>
    <button id="tool-pick">PICK</button>
  </div>
  <canvas id="viewport"></canvas>
  <div id="status">Ready</div>
</div>

<script type="module">
const TILE = 16;
const LEVELS = ['Tutorial Level', 'alley', 'hotel', 'maze2', 'diner', 'Big run'];

// Tile type definitions per layer
const TILE_TYPES = {
  floors: [
    'Tile_Floor_Wood', 'Tile_Floor_Hatched', 'Tile_Floor_Hatched 2',
    'Tile_Floor_Carpet', 'Tile_Floor_Checkered', 'Tile_Floor_Brick',
    'Tile_Floor_Asphalt', 'Tile_Floor_Asphalt 2', 'Tile_Floor_Sidewalk',
    'Tile_Floor_Shag', 'Tile_Floor_Stairs Down', 'Tile_Floor_Stairs Up',
    'Tile_Floor_Stairs2',
  ],
  walls: [
    'Tile_Wall', 'Tile_Destructible Wall', 'Tile_Invisible Wall',
    'Tile_Door1', 'Tile_Door2', 'Tile_Door3',
    'Tile_Door Locked', 'Tile_Door Elevator', 'Tile_Door_Manhole',
    'Tile_Window',
  ],
  furniture: [
    'Tile_Chair', 'Tile_Chair2', 'Tile_Bookshelf', 'Tile_Dresser',
    'Tile_End Table', 'Tile_Lamp', 'Tile_Television', 'Tile_Toilet',
    'Tile_Sink', 'Tile_Vase', 'Tile_Planter', 'Tile_Barrel', 'Tile_Tree',
    'Tile_Refrigerator', 'Tile_Stove', 'Tile_Countertop',
    'Tile_Fireplace L', 'Tile_Fireplace R',
    'Tile_Sofa Straight', 'Tile_Sofa Corner', 'Tile_Sofa Corner 2',
    'Tile_Bed Head L', 'Tile_Bed Head R', 'Tile_Bed Foot L', 'Tile_Bed Foot R',
    'Tile_Table Top Edge', 'Tile_Table Top Corner',
    'Tile_Table Bottom Edge', 'Tile_Table Bottom L', 'Tile_Table Bottom R',
    'Tile_Piano L', 'Tile_Piano R', 'Tile_Stool',
    'Tile_Hydrant', 'Tile_Sign', 'Tile_Dummy',
  ],
  items: [
    'Tile_Item_Pistol', 'Tile_Item_Auto Pistol', 'Tile_Item_Rifle',
    'Tile_Item_Shotgun', 'Tile_Item_TimeUp', 'Tile_Item_Key',
  ],
  enemies: [
    'Tile_Enemy',
  ],
};

// Texture map (same as TileSprites.ts)
const TEX_MAP = {
  'Tile_Floor_Wood': './assets/tiles/floor_wood.png',
  'Tile_Floor_Hatched': './assets/tiles/floor_hatched.png',
  'Tile_Floor_Hatched 2': './assets/tiles/floor_hatched2.png',
  'Tile_Floor_Carpet': './assets/tiles/floor_carpet.png',
  'Tile_Floor_Checkered': './assets/tiles/floor_checkered.png',
  'Tile_Floor_Asphalt': './assets/tiles/floor_asphalt.png',
  'Tile_Floor_Asphalt 2': './assets/tiles/floor_asphalt2.png',
  'Tile_Floor_Brick': './assets/tiles/floor_brick.png',
  'Tile_Floor_Sidewalk': './assets/tiles/floor_sidewalk.png',
  'Tile_Floor_Shag': './assets/tiles/floor_shag.png',
  'Tile_Floor_Stairs Down': './assets/tiles/floor_stairs.png',
  'Tile_Floor_Stairs Up': './assets/tiles/floor_stairs.png',
  'Tile_Floor_Stairs2': './assets/tiles/floor_stairs2.png',
  'Tile_Wall': './assets/tiles/wall.png',
  'Tile_Destructible Wall': './assets/tiles/wall_destructible.png',
  'Tile_Invisible Wall': './assets/tiles/wall_invisible.png',
  'Tile_Door1': './assets/tiles/door1.png',
  'Tile_Door2': './assets/tiles/door2.png',
  'Tile_Door3': './assets/tiles/door3.png',
  'Tile_Door Locked': './assets/tiles/door_locked.png',
  'Tile_Door Elevator': './assets/tiles/door_elevator.png',
  'Tile_Door_Manhole': './assets/tiles/door_manhole.png',
  'Tile_Window': './assets/tiles/window.png',
  'Tile_Item_Pistol': './assets/tiles/item_pistol.png',
  'Tile_Item_Auto Pistol': './assets/tiles/item_auto_pistol.png',
  'Tile_Item_Rifle': './assets/tiles/item_rifle.png',
  'Tile_Item_Shotgun': './assets/tiles/item_shotgun.png',
  'Tile_Item_TimeUp': './assets/tiles/item_timeup.png',
  'Tile_Item_Key': './assets/tiles/item_key.png',
  'Tile_Chair': './assets/sprites/Chair.png',
  'Tile_Chair2': './assets/sprites/Chair1.png',
  'Tile_Dresser': './assets/sprites/Dresser.png',
  'Tile_Fireplace L': './assets/sprites/Fireplace.png',
  'Tile_Fireplace R': './assets/sprites/Fireplace.png',
  'Tile_Lamp': './assets/sprites/Lamp.png',
  'Tile_Toilet': './assets/sprites/toilet.png',
  'Tile_Vase': './assets/sprites/Vase.png',
  'Tile_Planter': './assets/sprites/Plant.png',
  'Tile_Barrel': './assets/sprites/Barrel.png',
  'Tile_Tree': './assets/sprites/Tree.png',
  'Tile_Bookshelf': './assets/tiles/bookshelf.png',
  'Tile_End Table': './assets/tiles/end_table.png',
  'Tile_Television': './assets/tiles/television.png',
  'Tile_Sink': './assets/tiles/sink.png',
  'Tile_Refrigerator': './assets/tiles/refrigerator.png',
  'Tile_Stove': './assets/tiles/stove.png',
  'Tile_Countertop': './assets/tiles/countertop.png',
  'Tile_Sofa Straight': './assets/tiles/sofa_straight.png',
  'Tile_Sofa Corner': './assets/tiles/sofa_corner.png',
  'Tile_Sofa Corner 2': './assets/tiles/sofa_corner2.png',
  'Tile_Bed Head L': './assets/tiles/bed_head_l.png',
  'Tile_Bed Head R': './assets/tiles/bed_head_r.png',
  'Tile_Bed Foot L': './assets/tiles/bed_foot_l.png',
  'Tile_Bed Foot R': './assets/tiles/bed_foot_r.png',
  'Tile_Table Top Edge': './assets/tiles/table_top_edge.png',
  'Tile_Table Top Corner': './assets/tiles/table_top_corner.png',
  'Tile_Table Bottom Edge': './assets/tiles/table_bottom_edge.png',
  'Tile_Table Bottom L': './assets/tiles/table_bottom_l.png',
  'Tile_Table Bottom R': './assets/tiles/table_bottom_r.png',
  'Tile_Piano L': './assets/tiles/piano_l.png',
  'Tile_Piano R': './assets/tiles/piano_r.png',
  'Tile_Stool': './assets/tiles/stool.png',
  'Tile_Hydrant': './assets/tiles/hydrant.png',
  'Tile_Sign': './assets/tiles/sign.png',
  'Tile_Dummy': './assets/tiles/dummy.png',
  'Tile_Enemy': './assets/sprites/enemy_walk.png',
};

// Fallback colors
const COLORS = {
  'Tile_Floor_Hatched': '#F77F00', 'Tile_Floor_Wood': '#FCBF49',
  'Tile_Floor_Carpet': '#D62828', 'Tile_Floor_Checkered': '#FCBF49',
  'Tile_Floor_Asphalt': '#003049', 'Tile_Floor_Asphalt 2': '#003049',
  'Tile_Floor_Brick': '#F77F00', 'Tile_Floor_Sidewalk': '#FCBF49',
  'Tile_Floor_Shag': '#003049', 'Tile_Floor_Stairs Down': '#F77F00',
  'Tile_Wall': '#F77F00', 'Tile_Enemy': '#D62828',
};

// State
let levelData = null;
let textures = {};
let camera = { x: 0, y: 0, zoom: 2 };
let activeLayer = 'floors';
let activeTool = 'paint';
let selectedType = null;
let isDragging = false;
let isPanning = false;
let lastMouse = { x: 0, y: 0 };
let rotation = 0;
let spaceDown = false;

const canvas = document.getElementById('viewport');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

// Resize canvas
function resize() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
  render();
}
window.addEventListener('resize', resize);

// Load textures
async function loadTextures() {
  const promises = [];
  for (const [type, path] of Object.entries(TEX_MAP)) {
    promises.push(new Promise((resolve) => {
      const img = new Image();
      img.onload = () => { textures[type] = img; resolve(); };
      img.onerror = () => resolve();
      img.src = path;
    }));
  }
  await Promise.all(promises);
}

// Populate level select
const levelSelect = document.getElementById('level-select');
for (const name of LEVELS) {
  const opt = document.createElement('option');
  opt.value = name;
  opt.textContent = name;
  levelSelect.appendChild(opt);
}

// Load level
async function loadLevel(name) {
  const resp = await fetch(`./assets/levels/${name}.json`);
  levelData = await resp.json();
  // Center camera on level
  if (levelData.bounds) {
    const b = levelData.bounds;
    camera.x = (b.minX + b.maxX) / 2;
    camera.y = (b.minY + b.maxY) / 2;
  }
  status.textContent = `Loaded: ${name} (${levelData.layers.floors.length} floors, ${levelData.layers.walls.length} walls)`;
  render();
}

document.getElementById('btn-load').onclick = () => loadLevel(levelSelect.value);

// Save level directly to disk via dev server API
document.getElementById('btn-save').onclick = async () => {
  if (!levelData) return;
  status.textContent = 'Saving...';
  try {
    const resp = await fetch('/api/save-level', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: levelSelect.value, data: levelData }),
    });
    const result = await resp.json();
    if (result.ok) {
      status.textContent = `Saved to ${result.path}`;
    } else {
      status.textContent = `Save failed: ${JSON.stringify(result)}`;
    }
  } catch (err) {
    status.textContent = `Save failed: ${err}`;
  }
};

// Export (download JSON file)
document.getElementById('btn-export').onclick = () => {
  if (!levelData) return;
  const json = JSON.stringify(levelData);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${levelSelect.value}.json`;
  a.click();
  URL.revokeObjectURL(url);
  status.textContent = 'Downloaded!';
};

// Layer selection
document.querySelectorAll('input[name="layer"]').forEach(radio => {
  radio.addEventListener('change', () => {
    activeLayer = radio.value;
    buildPalette();
    render();
  });
});

// Tool selection
for (const tool of ['paint', 'erase', 'pick']) {
  document.getElementById(`tool-${tool}`).onclick = () => {
    activeTool = tool;
    document.querySelectorAll('#tool-bar button').forEach(b => b.classList.remove('active'));
    document.getElementById(`tool-${tool}`).classList.add('active');
  };
}

// Palette
function buildPalette() {
  const container = document.getElementById('palette');
  container.innerHTML = '';
  const types = TILE_TYPES[activeLayer] || [];

  const section = document.createElement('div');
  section.className = 'palette-section';

  const grid = document.createElement('div');
  grid.className = 'palette-grid';

  for (const type of types) {
    const item = document.createElement('div');
    item.className = 'palette-item';
    if (type === selectedType) item.classList.add('selected');
    item.title = type;

    const c = document.createElement('canvas');
    c.width = 16;
    c.height = 16;
    const cctx = c.getContext('2d');
    cctx.imageSmoothingEnabled = false;

    if (textures[type]) {
      // For spritesheets (enemy), only draw first frame
      cctx.drawImage(textures[type], 0, 0, 16, 16, 0, 0, 16, 16);
    } else {
      cctx.fillStyle = COLORS[type] || '#D62828';
      cctx.fillRect(0, 0, 16, 16);
    }

    item.appendChild(c);
    item.onclick = () => {
      selectedType = type;
      activeTool = 'paint';
      document.querySelectorAll('#tool-bar button').forEach(b => b.classList.remove('active'));
      document.getElementById('tool-paint').classList.add('active');
      buildPalette();
    };
    grid.appendChild(item);
  }

  section.appendChild(grid);
  container.appendChild(section);
}

// Render
function render() {
  if (!ctx) return;
  ctx.imageSmoothingEnabled = false;

  const w = canvas.width;
  const h = canvas.height;
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, w, h);

  if (!levelData) return;

  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  const layerOrder = ['floors', 'items', 'furniture', 'walls', 'enemies'];
  const depthMap = { floors: 0, items: 1, furniture: 2, walls: 3, enemies: 4 };

  for (const layerName of layerOrder) {
    const objs = levelData.layers[layerName];
    if (!objs) continue;

    const alpha = (layerName === activeLayer) ? 1.0 : 0.4;
    ctx.globalAlpha = alpha;

    for (const obj of objs) {
      const tex = textures[obj.type];
      const rot = (obj.rotation || 0) * Math.PI / 180;

      ctx.save();
      ctx.translate(obj.x, obj.y);
      if (rot) ctx.rotate(rot);

      if (tex) {
        ctx.drawImage(tex, 0, 0, 16, Math.min(tex.height, 16), -8, -8, 16, 16);
      } else {
        ctx.fillStyle = COLORS[obj.type] || '#D62828';
        ctx.fillRect(-8, -8, 16, 16);
      }

      ctx.restore();
    }
  }

  // Draw player spawn
  if (levelData.layers.player && levelData.layers.player[0]) {
    ctx.globalAlpha = 1.0;
    const p = levelData.layers.player[0];
    ctx.fillStyle = '#00FF00';
    ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
    ctx.strokeStyle = '#00FF00';
    ctx.strokeRect(p.x - 8, p.y - 8, 16, 16);
  }

  // Grid overlay for active layer
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#FCBF49';
  ctx.lineWidth = 0.5 / camera.zoom;
  if (levelData.bounds) {
    const b = levelData.bounds;
    for (let x = b.minX - TILE; x <= b.maxX + TILE; x += TILE) {
      ctx.beginPath();
      ctx.moveTo(x - 8, b.minY - TILE);
      ctx.lineTo(x - 8, b.maxY + TILE);
      ctx.stroke();
    }
    for (let y = b.minY - TILE; y <= b.maxY + TILE; y += TILE) {
      ctx.beginPath();
      ctx.moveTo(b.minX - TILE, y - 8);
      ctx.lineTo(b.maxX + TILE, y - 8);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// Screen coords to world coords
function screenToWorld(sx, sy) {
  const w = canvas.width;
  const h = canvas.height;
  const wx = (sx - w / 2) / camera.zoom + camera.x;
  const wy = (sy - h / 2) / camera.zoom + camera.y;
  return { x: wx, y: wy };
}

// Snap to tile grid
function snapToGrid(wx, wy) {
  return {
    x: Math.round(wx / TILE) * TILE,
    y: Math.round(wy / TILE) * TILE,
  };
}

// Find tile at position in layer
function findTileAt(layer, x, y) {
  const objs = levelData.layers[layer];
  if (!objs) return -1;
  for (let i = objs.length - 1; i >= 0; i--) {
    if (objs[i].x === x && objs[i].y === y) return i;
  }
  return -1;
}

// Place tile
function placeTile(sx, sy) {
  if (!levelData || !selectedType) return;
  const world = screenToWorld(sx, sy);
  const snapped = snapToGrid(world.x, world.y);

  // Remove existing tile at this position
  const idx = findTileAt(activeLayer, snapped.x, snapped.y);
  if (idx >= 0) {
    levelData.layers[activeLayer].splice(idx, 1);
  }

  const obj = { x: snapped.x, y: snapped.y, type: selectedType };
  if (rotation !== 0) obj.rotation = rotation;
  levelData.layers[activeLayer].push(obj);
  render();
}

// Erase tile
function eraseTile(sx, sy) {
  if (!levelData) return;
  const world = screenToWorld(sx, sy);
  const snapped = snapToGrid(world.x, world.y);
  const idx = findTileAt(activeLayer, snapped.x, snapped.y);
  if (idx >= 0) {
    levelData.layers[activeLayer].splice(idx, 1);
    render();
  }
}

// Pick tile
function pickTile(sx, sy) {
  if (!levelData) return;
  const world = screenToWorld(sx, sy);
  const snapped = snapToGrid(world.x, world.y);
  const idx = findTileAt(activeLayer, snapped.x, snapped.y);
  if (idx >= 0) {
    const obj = levelData.layers[activeLayer][idx];
    selectedType = obj.type;
    rotation = obj.rotation || 0;
    status.textContent = `Picked: ${obj.type} rot=${rotation}`;
    buildPalette();
  }
}

// Mouse events
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 1 || (e.button === 0 && (e.shiftKey || spaceDown))) {
    // Middle click, shift+click, or space+click = pan
    isPanning = true;
    lastMouse = { x: e.clientX, y: e.clientY };
    e.preventDefault();
    return;
  }

  if (e.button === 0) {
    isDragging = true;
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    if (activeTool === 'paint') placeTile(sx, sy);
    else if (activeTool === 'erase') eraseTile(sx, sy);
    else if (activeTool === 'pick') pickTile(sx, sy);
  }
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (isPanning) {
    const dx = (e.clientX - lastMouse.x) / camera.zoom;
    const dy = (e.clientY - lastMouse.y) / camera.zoom;
    camera.x -= dx;
    camera.y -= dy;
    lastMouse = { x: e.clientX, y: e.clientY };
    render();
    return;
  }

  if (isDragging) {
    if (activeTool === 'paint') placeTile(sx, sy);
    else if (activeTool === 'erase') eraseTile(sx, sy);
  }

  // Status: show tile info
  const world = screenToWorld(sx, sy);
  const snapped = snapToGrid(world.x, world.y);
  let info = `(${snapped.x}, ${snapped.y})`;
  if (levelData) {
    // Check all layers for tile at position
    for (const layer of ['floors', 'walls', 'furniture', 'items', 'enemies']) {
      const idx = findTileAt(layer, snapped.x, snapped.y);
      if (idx >= 0) {
        const obj = levelData.layers[layer][idx];
        info += ` | ${layer}: ${obj.type}`;
        if (obj.rotation) info += ` r${obj.rotation}`;
      }
    }
  }
  if (selectedType) info += ` | Selected: ${selectedType}`;
  status.textContent = info;
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  isPanning = false;
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  camera.zoom = Math.max(0.5, Math.min(8, camera.zoom * factor));
  render();
}, { passive: false });

// Space for pan
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { spaceDown = true; canvas.style.cursor = 'grab'; e.preventDefault(); }
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'Space') { spaceDown = false; canvas.style.cursor = 'crosshair'; }
});

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    rotation = (rotation + 90) % 360;
    status.textContent = `Rotation: ${rotation}`;
  }
  if (e.key === 'p') { activeTool = 'paint'; document.querySelectorAll('#tool-bar button').forEach(b => b.classList.remove('active')); document.getElementById('tool-paint').classList.add('active'); }
  if (e.key === 'e') { activeTool = 'erase'; document.querySelectorAll('#tool-bar button').forEach(b => b.classList.remove('active')); document.getElementById('tool-erase').classList.add('active'); }
  if (e.key === 'i') { activeTool = 'pick'; document.querySelectorAll('#tool-bar button').forEach(b => b.classList.remove('active')); document.getElementById('tool-pick').classList.add('active'); }
  if (e.key === '1') document.querySelector('input[value="floors"]').click();
  if (e.key === '2') document.querySelector('input[value="walls"]').click();
  if (e.key === '3') document.querySelector('input[value="furniture"]').click();
  if (e.key === '4') document.querySelector('input[value="items"]').click();
  if (e.key === '5') document.querySelector('input[value="enemies"]').click();
});

// Right-click = pick
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  pickTile(e.clientX - rect.left, e.clientY - rect.top);
});

// Init
async function init() {
  resize();
  status.textContent = 'Loading textures...';
  await loadTextures();
  status.textContent = 'Ready - select a level and click LOAD';
  buildPalette();
  render();
}

init();
</script>
</body>
</html>
